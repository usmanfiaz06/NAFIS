version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nafis-db
    environment:
      POSTGRES_USER: nafis
      POSTGRES_PASSWORD: nafis_secret
      POSTGRES_DB: nafis_db
    ports:
      - "5432:5432"
    volumes:
      - nafis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nafis -d nafis_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nafis_pgdata:
